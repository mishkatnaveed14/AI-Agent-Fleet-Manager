<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — VORTEX AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./responsive.css">
</head>
<body class="bg-[#0b1329] min-h-screen flex flex-col">

  <header class="p-6">
    <a href="index.html" class="flex items-center gap-3 w-fit">
      <svg class="w-8 h-8 animate-[spin_10s_linear_infinite]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f0ff"/><stop offset="100%" stop-color="#00ff66"/></linearGradient></defs>
        <path d="M12 2C6.48 2 2 6.48 2 12C2 14.76 3.12 17.26 4.93 19.07" stroke="url(#vg)" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 6C8.69 6 6 8.69 6 12C6 13.38 6.56 14.63 7.46 15.54" stroke="url(#vg)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2" fill="#00ff66"/>
      </svg>
      <span class="font-mono font-bold text-white">VORTEX <span class="text-xs bg-emerald-950 text-teal-100 border border-neon-green/40 px-1.5 py-0.5 rounded">AI</span></span>
    </a>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 pb-20">
    <div class="w-full max-w-sm">
      <h1 class="text-2xl font-bold text-white text-center">Create your fleet</h1>
      <p class="mt-2 text-sm text-gray-400 text-center">Free to start. No credit card required.</p>

      <form id="signupForm" class="mt-8 glass border border-slate-800/60 rounded-2xl p-6 space-y-4" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Full name</label>
          <input type="text" required placeholder="Mishkat Naveed"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Email</label>
          <input type="email" required placeholder="you@company.com"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Password</label>
          <input type="password" required placeholder="••••••••"
            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
        </div>
        <button type="submit" class="w-full rounded-xl bg-cyan-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-cyan-800 transition-colors">Create account</button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">Already have an account? <a href="login.html" class="text-cyan-400 hover:underline">Log in</a></p>
    </div>
  </main>
</body>
</html>
