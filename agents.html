<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Agents — Vortex AI</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cyber-dark': '#030712',
            'panel-dark': '#090d16',
            'neon-blue': '#00c3fd',
            'neon-green': '#00ff66',
          },
          screens: { xs: '480px' },
          boxShadow: {
            'neon-glow-blue': '0 0 20px rgba(0, 195, 253, 0.25)',
            'neon-glow-green': '0 0 20px rgba(0, 255, 102, 0.25)',
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts for High-Tech feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Modern Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    /* Dynamic Cyber Grid Background */
    .cyber-grid {
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
    }
  </style>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./responsive.css">
</head>

<body class="bg-cyber-dark text-slate-100 min-h-screen relative overflow-x-hidden antialiased">

  <!-- Futuristic Glowing Orbs in Background -->
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-neon-blue/10 blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-neon-green/5 blur-[120px] pointer-events-none"></div>

  <section class="flex min-h-screen relative z-10">

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" onclick="closeSidebar()"
      class="fixed inset-0 bg-black/60 backdrop-blur-md z-30 opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden">
    </div>

    <!-- Glassmorphic Sidebar -->
    <aside id="sidebar"
      class="w-64 h-screen bg-panel-dark/90 backdrop-blur-xl border-r border-slate-800/80 p-5 flex flex-col justify-between fixed left-0 top-0 z-40 -translate-x-full lg:translate-x-0 transition-all duration-300 ease-in-out">
      <div>
        <div class="flex items-center justify-between pb-6 border-b border-slate-800/60">
          <a href="index.html" class="flex items-center gap-3 group">
            <div class="relative">
              <div class="absolute inset-0 bg-neon-blue/20 rounded-full blur-md group-hover:bg-neon-green/20 transition-all duration-500"></div>
              <svg class="w-8 h-8 relative animate-[spin_12s_linear_infinite]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="vortexGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00f0ff" />
                    <stop offset="100%" stop-color="#00ff66" />
                  </linearGradient>
                </defs>
                <path d="M12 2C6.48 2 2 6.48 2 12C2 14.76 3.12 17.26 4.93 19.07" stroke="url(#vortexGradient2)" stroke-width="2.2" stroke-linecap="round" />
                <path d="M12 6C8.69 6 6 8.69 6 12C6 13.38 6.56 14.63 7.46 15.54" stroke="url(#vortexGradient2)" stroke-width="1.8" stroke-linecap="round" />
                <circle cx="12" cy="12" r="1.5" fill="#00ff66" />
              </svg>
            </div>
            <div class="font-mono font-bold flex flex-col leading-none">
              <div class="flex items-center gap-1.5">
                <span class="text-white group-hover:text-neon-blue transition-colors tracking-wider text-lg">VORTEX</span>
                <span class="text-[9px] bg-emerald-950/80 text-neon-green border border-neon-green/40 px-1 py-0.5 rounded font-sans font-extrabold tracking-wide">AI</span>
              </div>
            </div>
          </a>
          <button onclick="closeSidebar()" class="lg:hidden p-1.5 bg-slate-900/80 border border-slate-800 text-slate-400 hover:text-white rounded-xl transition-all duration-200">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
          </button>
        </div>

        <!-- Navigation Links with Glassmorphic hover -->
        <nav class="mt-8 space-y-2">
          <span class="text-[10px] font-mono uppercase tracking-[0.25em] text-slate-500 block px-3 mb-3">Management</span>

          <a href="dashboard.html" class="flex items-center gap-3 px-3 py-3 text-slate-400 hover:text-slate-100 hover:bg-slate-900/60 rounded-xl font-medium text-sm transition-all duration-200 group">
            <i data-lucide="layout-dashboard" class="w-4.5 h-4.5 text-slate-500 group-hover:text-neon-blue transition-colors"></i>
            Dashboard
          </a>

          <a href="agents.html" class="flex items-center gap-3 px-3 py-3 bg-gradient-to-r from-neon-blue/10 to-transparent text-white rounded-xl font-semibold text-sm border-l-2 border-neon-blue transition-all duration-200">
            <i data-lucide="cpu" class="w-4.5 h-4.5 text-neon-blue animate-pulse"></i>
            Fleet Agents
          </a>

          <a href="analytics.html" class="flex items-center gap-3 px-3 py-3 text-slate-400 hover:text-slate-100 hover:bg-slate-900/60 rounded-xl font-medium text-sm transition-all duration-200 group">
            <i data-lucide="bar-chart-3" class="w-4.5 h-4.5 text-slate-500 group-hover:text-neon-blue transition-colors"></i>
            Analytics
          </a>
        </nav>
      </div>

      <!-- User Profile at bottom -->
      <div class="border-t border-slate-800/80 pt-5">
        <div class="flex items-center gap-3 p-1.5 rounded-xl bg-slate-950/40 border border-slate-900">
          <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-neon-blue to-neon-green p-0.5 shadow-neon-glow-blue/20">
            <div class="w-full h-full bg-slate-950 rounded-full flex items-center justify-center text-xs font-mono font-bold text-white">MN</div>
          </div>
          <div class="flex flex-col leading-none">
            <span class="text-sm font-semibold text-slate-200">Mishkat Naveed</span>
            <span class="text-[10px] text-slate-500 font-mono mt-0.5">Core Engineer</span>
          </div>
        </div>
        <a href="index.html" class="mt-4 flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 text-sm font-medium transition-all duration-200">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          Log out
        </a>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 lg:ml-64 p-4 sm:p-6 lg:p-10 cyber-grid min-h-screen w-full transition-all">

      <!-- Header -->
      <div class="flex flex-col xs:flex-row xs:items-center justify-between mb-8 gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="openSidebar()" class="lg:hidden shrink-0 p-2.5 bg-slate-900/90 border border-slate-800/80 text-slate-300 rounded-xl hover:text-white hover:border-slate-700 transition-all">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <div class="min-w-0">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-white">Fleet Agents</h1>
            <p class="text-xs sm:text-sm text-slate-500 mt-1 font-mono flex items-center gap-2">
              <span class="w-1.5 h-1.5 bg-neon-green rounded-full animate-ping"></span>
              All instances currently active on the cyber grid
            </p>
          </div>
        </div>

        <!-- Pulse Animated Deploy Button -->
        <button id="deploybtn" class="flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-gradient-to-r from-neon-blue to-neon-green text-slate-950 text-sm font-bold shadow-neon-glow-blue hover:shadow-neon-glow-green hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
          <i data-lucide="plus-circle" class="w-4 h-4 stroke-[2.5]"></i>
          <span>Deploy Agent</span>
        </button>
      </div>

      <!-- Neon Cyber Filter bar -->
      <div class="flex flex-wrap items-center gap-2 mb-8 bg-slate-950/60 p-1.5 rounded-2xl border border-slate-900/80 w-fit">
        <button data-filter="all" class="agent-filter-btn px-4 py-2 rounded-xl text-xs font-semibold font-mono border border-neon-blue/20 bg-neon-blue/10 text-neon-blue shadow-neon-glow-blue/10 transition-all duration-200">All</button>
        <button data-filter="Active" class="agent-filter-btn px-4 py-2 rounded-xl text-xs font-semibold font-mono border border-transparent text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 transition-all duration-200">Active</button>
        <button data-filter="Idle" class="agent-filter-btn px-4 py-2 rounded-xl text-xs font-semibold font-mono border border-transparent text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 transition-all duration-200">Idle</button>
        <button data-filter="Queued" class="agent-filter-btn px-4 py-2 rounded-xl text-xs font-semibold font-mono border border-transparent text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 transition-all duration-200">Queued</button>
        <button data-filter="Failed" class="agent-filter-btn px-4 py-2 rounded-xl text-xs font-semibold font-mono border border-transparent text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 transition-all duration-200">Failed</button>
      </div>

      <!-- Cards Grid -->
      <div id="agentsGrid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-6">
        <!-- Injected dynamically by your app.js -->
      </div>
    </main>
  </section>

  <!-- Futuristic deployment modal -->
  <div id="agentModal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-950/80 backdrop-blur-md px-4">
    <div class="w-full max-w-md rounded-2xl bg-panel-dark/95 border border-slate-800/80 p-6 shadow-[0_0_50px_rgba(0,195,253,0.15)] text-white relative">
      <button id="closeModalBtn" class="absolute top-4 right-4 p-1 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition-all">&times;</button>
      
      <div class="flex items-center gap-3 mb-6">
        <div class="p-2 bg-neon-blue/10 rounded-xl text-neon-blue border border-neon-blue/20">
          <i data-lucide="terminal" class="w-5 h-5"></i>
        </div>
        <div>
          <h3 class="text-lg font-bold text-white">Deploy New Agent</h3>
          <p class="text-xs text-slate-500 font-mono">Execute grid-level initiation protocol</p>
        </div>
      </div>

      <form id="agentForm" class="space-y-4">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 font-mono">Agent Name</label>
          <input id="agentName" type="text" required class="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue/30 transition-all" placeholder="e.g., CyberScout-01">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 font-mono">Initial Task Assignment</label>
          <input id="agentTask" type="text" required class="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue/30 transition-all" placeholder="e.g., Network Scan">
        </div>
        <div class="flex gap-3 pt-4">
          <button id="cancelBtn" type="button" class="flex-1 px-4 py-3 rounded-xl border border-slate-800 text-slate-400 text-sm font-semibold hover:bg-slate-900 hover:text-white transition-all">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-3 rounded-xl bg-gradient-to-r from-neon-blue to-neon-green text-slate-950 text-sm font-bold hover:shadow-neon-glow-blue transition-all">Confirm Deploy</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Lucide Icons Script Initialize -->
  <script>
    lucide.createIcons();
  </script>
  <script src="./app.js"></script>
</body>
</html>
