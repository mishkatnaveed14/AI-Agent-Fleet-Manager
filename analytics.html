<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Vortex AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cyber-dark': '#05070a',
            'panel-dark': '#0a0e14',
            'neon-blue': '#00c3fd',
            'neon-green': '#00ff66',
          },
          screens: { xs: '480px' },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./responsive.css">
</head>

<body class="bg-gray-900">

  <section class="bg-cyber-dark text-slate-100 min-h-screen font-sans antialiased flex">

    <div id="sidebarOverlay" onclick="closeSidebar()"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden">
    </div>

    <aside id="sidebar"
      class="w-64 h-screen bg-panel-dark border-r border-slate-800/60 p-4 flex flex-col justify-between fixed left-0 top-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
      <div>
        <div class="flex items-center justify-between pb-6 border-b border-slate-800/50">
          <a href="index.html" class="flex items-center gap-2.5">
            <svg class="w-8 h-8 animate-[spin_12s_linear_infinite]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="vortexGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00f0ff" />
                  <stop offset="100%" stop-color="#00ff66" />
                </linearGradient>
              </defs>
              <path d="M12 2C6.48 2 2 6.48 2 12C2 14.76 3.12 17.26 4.93 19.07" stroke="url(#vortexGradient3)" stroke-width="2" stroke-linecap="round" />
              <path d="M12 6C8.69 6 6 8.69 6 12C6 13.38 6.56 14.63 7.46 15.54" stroke="url(#vortexGradient3)" stroke-width="2" stroke-linecap="round" />
              <circle cx="12" cy="12" r="1.5" fill="#00ff66" />
            </svg>
            <div class="font-mono font-bold flex flex-col leading-none">
              <div class="flex items-center gap-1">
                <span class="text-neon-blue tracking-wide text-lg">VORTEX</span>
                <span class="text-[10px] bg-emerald-950 text-neon-green border border-neon-green/30 px-1 py-0.2 rounded font-sans">AI</span>
              </div>
            </div>
          </a>
          <button onclick="closeSidebar()" class="lg:hidden p-1.5 bg-slate-900 border border-slate-800 text-slate-400 hover:text-white rounded-lg transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          </button>
        </div>

        <nav class="mt-6 space-y-1.5">
          <span class="text-[10px] font-mono uppercase tracking-[0.2em] text-slate-500 block px-3 mb-2">Management</span>

          <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 rounded-xl font-medium text-sm transition-all group">
            <svg class="w-4 h-4 text-slate-500 group-hover:text-neon-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path></svg>
            Dashboard
          </a>

          <a href="agents.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-100 hover:bg-slate-900/50 rounded-xl font-medium text-sm transition-all group">
            <svg class="w-4 h-4 text-slate-500 group-hover:text-neon-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            Fleet Agents
          </a>

          <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 bg-slate-800/40 text-white rounded-xl font-medium text-sm transition-all border border-slate-700/30">
            <svg class="w-4 h-4 text-neon-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Analytics
          </a>
        </nav>
      </div>

      <div class="border-t border-slate-800/50 pt-4">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-neon-blue to-neon-green p-0.5">
            <div class="w-full h-full bg-slate-950 rounded-full flex items-center justify-center text-xs font-mono font-bold text-white">MN</div>
          </div>
          <div class="flex flex-col leading-none">
            <span class="text-sm font-semibold text-slate-200">Mishkat Naveed</span>
            <span class="text-[10px] text-slate-500 font-mono mt-0.5">Core Engineer</span>
          </div>
        </div>
        <a href="index.html" class="mt-4 flex items-center gap-2.5 px-3 py-2 rounded-xl text-slate-400 hover:text-rose-300 hover:bg-rose-500/10 text-sm font-medium transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Log out
        </a>
      </div>
    </aside>

    <main class="flex-1 lg:ml-64 p-4 sm:p-6 lg:p-8 grid-bg min-h-screen w-full">

      <div class="flex items-center gap-3 mb-6">
        <button onclick="openSidebar()" class="lg:hidden shrink-0 p-2 bg-slate-900 border border-slate-800 text-slate-300 rounded-lg hover:text-white hover:border-slate-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div>
          <h1 class="text-xl sm:text-2xl font-bold text-white">Analytics</h1>
          <p class="text-xs text-slate-500 mt-0.5 font-mono">Fleet-wide performance, last 7 days</p>
        </div>
      </div>

      <div class="grid grid-cols-2 xl:grid-cols-4 gap-3 sm:gap-4 mb-6">
        <div class="glass border border-slate-800/60 rounded-2xl p-4">
          <p class="text-2xl font-bold text-white font-mono">2,481</p>
          <p class="text-xs text-slate-500 mt-0.5">Tasks completed</p>
        </div>
        <div class="glass border border-slate-800/60 rounded-2xl p-4">
          <p class="text-2xl font-bold text-white font-mono">1.2s</p>
          <p class="text-xs text-slate-500 mt-0.5">Avg. response time</p>
        </div>
        <div class="glass border border-slate-800/60 rounded-2xl p-4">
          <p class="text-2xl font-bold text-white font-mono">99.98%</p>
          <p class="text-xs text-slate-500 mt-0.5">Uptime</p>
        </div>
        <div class="glass border border-slate-800/60 rounded-2xl p-4">
          <p class="text-2xl font-bold text-white font-mono">0.8%</p>
          <p class="text-xs text-slate-500 mt-0.5">Failure rate</p>
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
        <div class="glass border border-slate-800/60 rounded-2xl p-4 sm:p-5">
          <p class="text-sm font-semibold text-slate-200 mb-3">Throughput trend</p>
          <div class="h-64"><canvas id="analyticsLineChart"></canvas></div>
        </div>
        <div class="glass border border-slate-800/60 rounded-2xl p-4 sm:p-5">
          <p class="text-sm font-semibold text-slate-200 mb-3">Agent status breakdown</p>
          <div class="h-64"><canvas id="analyticsDoughnutChart"></canvas></div>
        </div>
        <div class="glass border border-slate-800/60 rounded-2xl p-4 sm:p-5 xl:col-span-2">
          <p class="text-sm font-semibold text-slate-200 mb-3">Tasks by workflow type</p>
          <div class="h-64"><canvas id="analyticsBarChart"></canvas></div>
        </div>
      </div>
    </main>
  </section>

  <script src="./app.js"></script>
</body>
</html>
